<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the app paint under the iPad/iPhone safe areas;
         user-scalable=no keeps the writing surface stable under Apple Pencil. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Apple home-screen / standalone web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Storm's Calling" />
    <meta name="theme-color" content="#2B2D22" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#E7DECF" media="(prefers-color-scheme: light)" />
    <!-- stop iOS from auto-linking phone numbers / dates in the manuscript -->
    <meta name="format-detection" content="telephone=no" />
    <title>Storm's Calling Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
