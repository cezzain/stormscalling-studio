services:
  studio:
    build: .
    container_name: storms-calling-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Your writing data (SQLite DB + images) lives here on the NAS.
      # Change the left side to any folder path you want on your NAS.
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: "8080"

      # ---- Secrets come from a local `.env` file next to this one ----
      # Create `.env` on the NAS with only the lines you need — it is gitignored,
      # so your keys never get committed. Anything omitted falls back to empty.
      # Example .env:
      #   GEMINI_API_KEY=AQ.your-key
      #   AUTH_USERNAME=azeem
      #   AUTH_PASSWORD=a-strong-password
      #   SESSION_SECRET=<output of: openssl rand -hex 32>

      # ---- AI (set the key for whichever provider you use) ----
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"   # sk-ant-...
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"

      # ---- Login wall (strongly recommended on a NAS) ----
      # Leave both blank → no login required (LAN-only is safe).
      # Set both → login screen appears every time you open the app.
      AUTH_USERNAME: "${AUTH_USERNAME:-}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-}"

      # Optional: sign the session cookie with a dedicated secret.
      SESSION_SECRET: "${SESSION_SECRET:-}"
